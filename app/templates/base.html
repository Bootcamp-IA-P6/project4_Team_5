<!DOCTYPE html>
<html lang="en" data-theme="light" data-lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OopsBin{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/pet1.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="OopsBin" class="logo-img">
        </a>
        <div class="nav-controls">
            <div class="lang-selector">
                <button class="lang-btn" id="langBtn" title="Language">
                    <i class="fa-solid fa-globe"></i>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button class="lang-option" data-lang="en">English</button>
                    <button class="lang-option" data-lang="es">Español</button>
                    <button class="lang-option" data-lang="ko">한국어</button>
                </div>
            </div>
            <div class="font-size-selector">
                <button class="a11y-btn" id="fontSizeBtn" title="Text size">
                    <i class="fa-solid fa-text-height"></i>
                </button>
                <div class="lang-dropdown font-size-dropdown" id="fontSizeDropdown">
                    <div class="font-size-panel">
                        <span class="font-size-label" data-i18n="font_size_label">Text Size</span>
                        <div class="font-size-controls">
                            <span class="font-size-small">A</span>
                            <input type="range" id="fontSizeSlider" min="80" max="140" value="100" step="10">
                            <span class="font-size-large">A</span>
                        </div>
                        <button class="font-size-reset" id="fontSizeReset" data-i18n="font_size_reset">Reset</button>
                    </div>
                </div>
            </div>
            <div class="a11y-selector">
                <button class="a11y-btn" id="a11yBtn" title="Accessibility">
                    <i class="fa-solid fa-eye"></i>
                </button>
                <div class="lang-dropdown" id="a11yDropdown">
                    <button class="lang-option" data-a11y="normal" data-i18n="a11y_normal">Normal</button>
                    <button class="lang-option" data-a11y="protanopia" data-i18n="a11y_protanopia">Protanopia (Red-blind)</button>
                    <button class="lang-option" data-a11y="deuteranopia" data-i18n="a11y_deuteranopia">Deuteranopia (Green-blind)</button>
                    <button class="lang-option" data-a11y="tritanopia" data-i18n="a11y_tritanopia">Tritanopia (Blue-blind)</button>
                    <button class="lang-option" data-a11y="high-contrast" data-i18n="a11y_contrast">High Contrast</button>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <audio id="bgMusic" loop preload="auto">
        <source src="{{ url_for('static', filename='music/background.mp3') }}" type="audio/mpeg">
    </audio>
    <footer>
        <div class="footer-content">
            <a href="/" class="footer-mascot-link" title="Back to top">
                <img src="" alt="OopsBin" class="footer-mascot" id="footerPet">
            </a>
            <p data-i18n="footer">OopsBin &mdash; Waste Classification System</p>
        </div>
    </footer>
    <script>
        // ========== PET IMAGES BY THEME ==========
        function updatePetImages() {
            const theme = document.documentElement.getAttribute('data-theme');
            const petSrc = theme === 'dark'
                ? '{{ url_for("static", filename="img/pet2.png") }}'
                : '{{ url_for("static", filename="img/pet1.png") }}';
            document.querySelectorAll('.pet-img').forEach(img => img.src = petSrc);
            const footerPet = document.getElementById('footerPet');
            if (footerPet) footerPet.src = petSrc;
        }

        // ========== THEME TOGGLE ==========
        const toggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) html.setAttribute('data-theme', savedTheme);
        toggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            toggle.innerHTML = next === 'dark'
                ? '<i class="fa-solid fa-sun"></i>'
                : '<i class="fa-solid fa-moon"></i>';
            updatePetImages();
        });
        if (html.getAttribute('data-theme') === 'dark') {
            toggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
        }
        updatePetImages();

        // ========== LANGUAGE SELECTOR ==========
        const langBtn = document.getElementById('langBtn');
        const langDropdown = document.getElementById('langDropdown');

        const savedLang = localStorage.getItem('lang') || 'en';
        html.setAttribute('data-lang', savedLang);

        langBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            langDropdown.classList.toggle('open');
        });

        document.addEventListener('click', () => {
            langDropdown.classList.remove('open');
            a11yDropdown.classList.remove('open');
            fontSizeDropdown.classList.remove('open');
        });

        document.querySelectorAll('.lang-option[data-lang]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const lang = btn.dataset.lang;
                if (!lang) return;
                html.setAttribute('data-lang', lang);
                localStorage.setItem('lang', lang);
                langDropdown.classList.remove('open');
                applyTranslations(lang);
            });
        });

        function applyTranslations(lang) {
            const t = translations[lang];
            if (!t) return;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (t[key]) el.innerHTML = t[key];
            });
        }

        // Apply on load
        applyTranslations(savedLang);

        // ========== FONT SIZE ==========
        const fontSizeBtn = document.getElementById('fontSizeBtn');
        const fontSizeDropdown = document.getElementById('fontSizeDropdown');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeReset = document.getElementById('fontSizeReset');

        const savedFontSize = localStorage.getItem('fontSize') || '100';
        fontSizeSlider.value = savedFontSize;
        document.documentElement.style.fontSize = savedFontSize + '%';

        fontSizeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fontSizeDropdown.classList.toggle('open');
            langDropdown.classList.remove('open');
            document.getElementById('a11yDropdown').classList.remove('open');
        });

        fontSizeSlider.addEventListener('input', (e) => {
            e.stopPropagation();
            const size = e.target.value;
            document.documentElement.style.fontSize = size + '%';
            localStorage.setItem('fontSize', size);
        });

        fontSizeSlider.addEventListener('click', (e) => e.stopPropagation());

        fontSizeReset.addEventListener('click', (e) => {
            e.stopPropagation();
            fontSizeSlider.value = 100;
            document.documentElement.style.fontSize = '100%';
            localStorage.setItem('fontSize', '100');
        });

        // ========== ACCESSIBILITY SELECTOR ==========
        const a11yBtn = document.getElementById('a11yBtn');
        const a11yDropdown = document.getElementById('a11yDropdown');

        const savedA11y = localStorage.getItem('a11y') || 'normal';
        html.setAttribute('data-a11y', savedA11y);

        a11yBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            a11yDropdown.classList.toggle('open');
            langDropdown.classList.remove('open');
            fontSizeDropdown.classList.remove('open');
        });

        langBtn.addEventListener('click', () => {
            a11yDropdown.classList.remove('open');
            fontSizeDropdown.classList.remove('open');
        });

        document.querySelectorAll('[data-a11y]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const mode = btn.dataset.a11y;
                html.setAttribute('data-a11y', mode);
                localStorage.setItem('a11y', mode);
                a11yDropdown.classList.remove('open');
            });
        });
    </script>
