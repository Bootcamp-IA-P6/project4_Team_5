<!DOCTYPE html>
<html lang="en" data-theme="light" data-lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OopsBin{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/pet1.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="OopsBin" class="logo-img">
        </a>
        <div class="nav-controls">
            <div class="lang-selector">
                <button class="lang-btn" id="langBtn" title="Language">
                    <i class="fa-solid fa-globe"></i> <span id="langLabel">EN</span>
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button class="lang-option" data-lang="en">English</button>
                    <button class="lang-option" data-lang="es">Español</button>
                    <button class="lang-option" data-lang="ko">한국어</button>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <div class="footer-content">
            <a href="/" class="footer-mascot-link" title="Back to top">
                <img src="" alt="OopsBin" class="footer-mascot" id="footerPet">
            </a>
            <p data-i18n="footer">OopsBin &mdash; Waste Classification System</p>
        </div>
    </footer>
    <script>
        // ========== PET IMAGES BY THEME ==========
        function updatePetImages() {
            const theme = document.documentElement.getAttribute('data-theme');
            const petSrc = theme === 'dark'
                ? '{{ url_for("static", filename="img/pet2.png") }}'
                : '{{ url_for("static", filename="img/pet1.png") }}';
            document.querySelectorAll('.pet-img').forEach(img => img.src = petSrc);
            const footerPet = document.getElementById('footerPet');
            if (footerPet) footerPet.src = petSrc;
        }

        // ========== THEME TOGGLE ==========
        const toggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) html.setAttribute('data-theme', savedTheme);
        toggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            toggle.innerHTML = next === 'dark'
                ? '<i class="fa-solid fa-sun"></i>'
                : '<i class="fa-solid fa-moon"></i>';
            updatePetImages();
        });
        if (html.getAttribute('data-theme') === 'dark') {
            toggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
        }
        updatePetImages();

        // ========== LANGUAGE SELECTOR ==========
        const langBtn = document.getElementById('langBtn');
        const langDropdown = document.getElementById('langDropdown');
        const langLabel = document.getElementById('langLabel');

        const savedLang = localStorage.getItem('lang') || 'en';
        html.setAttribute('data-lang', savedLang);
        const langLabels = { en: 'EN', es: 'ES', ko: 'KO' };
        langLabel.textContent = langLabels[savedLang];

        langBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            langDropdown.classList.toggle('open');
        });

        document.addEventListener('click', () => langDropdown.classList.remove('open'));

        document.querySelectorAll('.lang-option').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const lang = btn.dataset.lang;
                html.setAttribute('data-lang', lang);
                localStorage.setItem('lang', lang);
                langLabel.textContent = langLabels[lang];
                langDropdown.classList.remove('open');
                applyTranslations(lang);
            });
        });
